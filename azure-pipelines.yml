trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: percy-secrets # Ensure this group has SECRET_GITHUB_TOKEN and SECRET_PERCY_TOKEN

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0 # Fetch all branches so 'update-button-base' is visible

- task: NodeTool@0
  inputs:
    versionSpec: '16.x'
  displayName: 'Install Node.js'

- bash: |
    # 1. Setup Identity
    git config --global user.email "abdulqadir.k@browserstack.com"
    git config --global user.name "Abdul Qadir Khan"

    # 2. Map Secrets to local variables
    export GITHUB_TOKEN=$MY_TOKEN
    export GH_TOKEN=$MY_TOKEN
    export PERCY_TOKEN=$MY_PERCY_TOKEN

    # 3. FORCE LOGIN the GitHub CLI (The Nuclear Option)
    # This bypasses any environment variable detection issues
    echo "$GH_TOKEN" | gh auth login --with-token

    # 4. Verify login (This will show in your logs)
    gh auth status

    # 5. Run the script
    chmod +x create-demo-pr.sh
    ./create-demo-pr.sh
  displayName: 'Generate Visual Changes and Percy PR'
  env:
    # Ensure these names match your Library > Variable Group
    MY_TOKEN: $(SECRET_GITHUB_TOKEN)
    MY_PERCY_TOKEN: $(SECRET_PERCY_TOKEN)
