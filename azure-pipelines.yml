trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: percy-secrets # Ensure this group has SECRET_GITHUB_TOKEN and SECRET_PERCY_TOKEN

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0 # Fetch all branches so 'update-button-base' is visible

- task: NodeTool@0
  inputs:
    versionSpec: '16.x'
  displayName: 'Install Node.js'

- bash: |
    # Set Git Config
    git config --global user.email "devops@azure.com"
    git config --global user.name "Azure Pipeline"
    
    # 1. Replicate the Jenkins "Visual Change" logic
    # We create the branch locally, modify files, and commit
    git checkout -b update-button-base
    cp changed_assets/css/spark.css assets/css/spark.css
    cp changed_assets/scss/01-settings/_colors.scss assets/scss/01-settings/_colors.scss
    git add assets
    git commit -m "Injected visual changes for demo"
    
    # 2. Run the PR script
    # We pass the secrets as environment variables
    export GITHUB_TOKEN=$(SECRET_GITHUB_TOKEN)
    export PERCY_TOKEN=$(SECRET_PERCY_TOKEN)
    export GH_TOKEN=$(SECRET_GITHUB_TOKEN) # Required for 'gh' CLI
    
    chmod +x create-demo-pr.sh
    ./create-demo-pr.sh
  displayName: 'Generate Visual Changes and Percy PR'