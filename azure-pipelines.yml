trigger: none # Kept manual so you control when baselines are generated
pr: none

variables:
- group: percy-secrets

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  displayName: 'Install Node.js 16.x'
  inputs:
    versionSpec: '16.x'

- script: |
    if [ -z "$MY_PERCY_TOKEN" ]; then
      echo "##[error]CRITICAL FAILURE: The Variable Group is still not passing the secret to Bash!"
      exit 1
    fi
    
    echo "SUCCESS: Percy token loaded."

    # 1. Install Dependencies
    npm install

    # 2. Execute Percy directly on the current branch (main)
    # We completely bypassed create-demo-pr.sh because we don't want a PR!
    npm test

  displayName: 'Generate Percy Baseline on Main'
  env:
    # Percy automatically looks for this exact environment variable
    PERCY_TOKEN: $(SECRET_PERCY_TOKEN)
    MY_PERCY_TOKEN: $(SECRET_PERCY_TOKEN)
    # Explicitly tell Percy this is the baseline branch
    PERCY_BRANCH: 'main'
