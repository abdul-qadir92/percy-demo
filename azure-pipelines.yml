trigger:
  branches:
    include:
      - main

variables:
- group: percy-secrets

pool:
  vmImage: 'ubuntu-latest'

steps:
- script: |
    # ==========================================
    # DEBUG: Check if token is empty
    # ==========================================
    if [ -z "$MY_GITHUB_TOKEN" ]; then
      echo "##[error]CRITICAL FAILURE: The Variable Group is still not passing the secret to Bash!"
      exit 1
    fi
    
    echo "SUCCESS: Token successfully loaded from Variable Group!"

    # Install 'hub' CLI
    sudo apt-get update
    sudo apt-get install -y hub

    # 1. Safely Setup Environment Variables
    REQUESTED_EMAIL="$(Build.RequestedForEmail)"
    if [ -z "$REQUESTED_EMAIL" ]; then
      REQUESTED_EMAIL="ci-bot@percy-demo.com"
    fi
    
    export GITHUB_USER="$(Build.RequestedFor)"
    # Notice we are now using the MY_ prefixed variables here!
    export GITHUB_TOKEN="${MY_GITHUB_TOKEN}"
    export PERCY_TOKEN="${MY_PERCY_TOKEN}"
    export CI_USER_ID=$(echo "$REQUESTED_EMAIL" | cut -d@ -f1)
    export PUPPETEER_SKIP_DOWNLOAD=true

    echo "The current user id is: ${CI_USER_ID}"

    # 2. Setup Git Identity & Authentication
    git config --global user.email "$REQUESTED_EMAIL"
    git config --global user.name "$GITHUB_USER"
    git remote set-url origin "https://x-access-token:${MY_GITHUB_TOKEN}@github.com/abdul-qadir92/percy-demo.git"

    # 3. Install Dependencies
    npm install

    # 4. Prepare Branch and Files
    git fetch origin main
    git checkout main
    git checkout -b update-button-base
    
    mkdir -p assets/css assets/scss/01-settings
    cp changed_assets/css/spark.css assets/css/spark.css
    cp changed_assets/scss/01-settings/_colors.scss assets/scss/01-settings/_colors.scss
    
    git add assets
    git commit -m "Update button style changes"
    git checkout main

    # 5. Execute PR script and capture logs
    mkdir -p logs
    bash create-demo-pr.sh 2>&1 | tee logs/pr_output.log
    
    grep "Finalized build" logs/pr_output.log >> logs/log_$(Build.BuildId).txt
    echo "Current directory: $(pwd)"
    git branch -D update-button-base

  displayName: 'Create Percy build and upload snapshots'
  env:
    # THE FIX: Rename the target environment variables to avoid shadowing
    MY_GITHUB_TOKEN: $(SECRET_GITHUB_TOKEN)
    MY_PERCY_TOKEN: $(SECRET_PERCY_TOKEN)

# Archive the extracted log as an artifact
- task: PublishPipelineArtifact@1
  displayName: 'Publish Percy Log Artifact'
  inputs:
    targetPath: 'logs/log_$(Build.BuildId).txt'
    artifact: 'PercyLog'
    publishLocation: 'pipeline'
  condition: succeeded()
