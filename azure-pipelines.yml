trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: percy-secrets # Ensure this group has SECRET_GITHUB_TOKEN and SECRET_PERCY_TOKEN

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0 # Fetch all branches so 'update-button-base' is visible

- task: NodeTool@0
  inputs:
    versionSpec: '16.x'
  displayName: 'Install Node.js'

- bash: |
    # IMPORTANT: Do NOT use $(VAR) inside the script block for secrets.
    # Just use the environment variables we mapped below.
    
    export GITHUB_TOKEN=$MY_GITHUB_SECRET
    export PERCY_TOKEN=$MY_PERCY_SECRET
    export GH_TOKEN=$MY_GITHUB_SECRET # The 'gh' CLI looks for this specifically
    
    echo "The current user is: $(Build.RequestedFor)"

    # Git identity
    git config --global user.email "devops@azure.com"
    git config --global user.name "Azure Pipeline"

    chmod +x create-demo-pr.sh
    ./create-demo-pr.sh
  displayName: 'Generate Visual Changes and Percy PR'
  env:
    # This is where the magic happens: mapping secrets to the script environment
    MY_GITHUB_SECRET: $(SECRET_GITHUB_TOKEN)
    MY_PERCY_SECRET: $(SECRET_PERCY_TOKEN)
