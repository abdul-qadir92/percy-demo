trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: percy-secrets # Ensure this group has SECRET_GITHUB_TOKEN and SECRET_PERCY_TOKEN

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0 # Fetch all branches so 'update-button-base' is visible

- task: NodeTool@0
  inputs:
    versionSpec: '16.x'
  displayName: 'Install Node.js'

- bash: |
    # 1. Setup Git Identity
    git config --global user.email "abdulqadir.k@browserstack.com"
    git config --global user.name "Abdul Qadir Khan"

    # 2. DEBUG: Check if the token is arriving (it will show as ***)
    if [ -z "$MY_TOKEN" ]; then
      echo "##vso[task.logissue type=error]SECRET_GITHUB_TOKEN is empty! Check Variable Group."
      exit 1
    fi

    # 3. Just run the script. Do NOT run 'gh auth login'. 
    # The 'gh' CLI will automatically use $GH_TOKEN if we map it below.
    chmod +x create-demo-pr.sh
    ./create-demo-pr.sh
  displayName: 'Generate Visual Changes and Percy PR'
  env:
    # Use 'GH_TOKEN' as the key so the CLI finds it automatically
    GH_TOKEN: $(SECRET_GITHUB_TOKEN)
    GITHUB_TOKEN: $(SECRET_GITHUB_TOKEN)
    PERCY_TOKEN: $(SECRET_PERCY_TOKEN)
