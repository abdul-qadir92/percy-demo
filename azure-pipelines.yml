trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

# NOTE: You must define SECRET_GITHUB_TOKEN and SECRET_PERCY_TOKEN
# as Secret Variables in the Azure DevOps Pipeline UI.

steps:
- task: NodeTool@0
  displayName: 'Install Node.js 16.x'
  inputs:
    versionSpec: '16.x'

- script: |
    # ==========================================
    # DEBUG: Check if token is empty
    # ==========================================
    if [ -z "$SECRET_GITHUB_TOKEN" ]; then
      echo "##[error]CRITICAL FAILURE: The SECRET_GITHUB_TOKEN is empty! Azure DevOps is not passing the variable to the script."
      exit 1
    fi

    # Install 'hub' CLI
    sudo apt-get update
    sudo apt-get install -y hub

    # 1. Safely Setup Environment Variables
    REQUESTED_EMAIL="$(Build.RequestedForEmail)"
    if [ -z "$REQUESTED_EMAIL" ]; then
      REQUESTED_EMAIL="ci-bot@percy-demo.com"
    fi
    
    export GITHUB_USER="$(Build.RequestedFor)"
    export GITHUB_TOKEN="${SECRET_GITHUB_TOKEN}"
    export PERCY_TOKEN="${SECRET_PERCY_TOKEN}"
    export CI_USER_ID=$(echo "$REQUESTED_EMAIL" | cut -d@ -f1)
    export PUPPETEER_SKIP_DOWNLOAD=true

    echo "The current user id is: ${CI_USER_ID}"

    # 2. Setup Git Identity & Authentication
    git config --global user.email "$REQUESTED_EMAIL"
    git config --global user.name "$GITHUB_USER"
    git remote set-url origin "https://x-access-token:${SECRET_GITHUB_TOKEN}@github.com/abdul-qadir92/percy-demo.git"

    # 3. Install Dependencies
    npm install

    # 4. Prepare Branch and Files
    git fetch origin main
    git checkout main
    git checkout -b update-button-base
    
    mkdir -p assets/css assets/scss/01-settings
    cp changed_assets/css/spark.css assets/css/spark.css
    cp changed_assets/scss/01-settings/_colors.scss assets/scss/01-settings/_colors.scss
    
    git add assets
    git commit -m "Update button style changes"
    git checkout main

    # 5. Execute PR script and capture logs
    mkdir -p logs
    bash create-demo-pr.sh 2>&1 | tee logs/pr_output.log
    
    grep "Finalized build" logs/pr_output.log >> logs/log_$(Build.BuildId).txt
    echo "Current directory: $(pwd)"
    git branch -D update-button-base

  displayName: 'Create Percy build and upload snapshots'
  env:
    SECRET_GITHUB_TOKEN: $(SECRET_GITHUB_TOKEN)
    SECRET_PERCY_TOKEN: $(SECRET_PERCY_TOKEN)
